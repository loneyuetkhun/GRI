<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>城市知识 - 地理</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .city-page {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            min-height: 100vh;
        }

        .city-header {
            background: white;
            padding: 1.5rem 2rem;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .back-link {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: var(--primary-color);
        }

        .city-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .city-container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 20px;
        }

        .city-info {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-lg);
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        .breadcrumb a {
            color: var(--primary-color);
            text-decoration: none;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }

        .city-header-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .city-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }

        .city-name h2 {
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }

        .city-name .province-tag {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: var(--bg-secondary);
            color: var(--primary-color);
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .knowledge-section {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            box-shadow: var(--shadow-lg);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--bg-color);
        }

        .section-title {
            font-size: 1.2rem;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .create-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1.25rem;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .create-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .knowledge-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .knowledge-item {
            background: var(--bg-color);
            padding: 1.5rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .knowledge-item:hover {
            background: white;
            border-color: var(--primary-light);
            transform: translateX(5px);
        }

        .knowledge-item h4 {
            color: var(--text-primary);
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        .knowledge-item p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .knowledge-meta {
            display: flex;
            gap: 1rem;
            margin-top: 0.75rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .knowledge-meta span {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .empty-knowledge {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .empty-knowledge .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .empty-knowledge h3 {
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .empty-knowledge p {
            margin-bottom: 1.5rem;
        }

        .admin-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .admin-btn {
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
        }

        .admin-btn.edit {
            background: var(--bg-secondary);
            color: var(--primary-color);
        }

        .admin-btn.delete {
            background: #fef2f2;
            color: #ef4444;
        }

        .admin-btn:hover {
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .city-header {
                flex-direction: column;
                gap: 1rem;
            }

            .section-header {
                flex-direction: column;
                gap: 1rem;
                align-items: flex-start;
            }

            .city-header-info {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body class="city-page">
    <header class="city-header">
        <a href="#" onclick="goBack()" class="back-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            返回省份
        </a>
        <h1 class="city-title" id="cityTitle">城市知识</h1>
        <div style="width: 100px;"></div>
    </header>

    <main class="city-container">
        <div class="city-info">
            <div class="breadcrumb">
                <a href="map.html">中国地图</a>
                <span>/</span>
                <a href="#" id="provinceLink">省份</a>
                <span>/</span>
                <span id="currentCity">城市</span>
            </div>
            
            <div class="city-header-info">
                <div class="city-icon">🏙️</div>
                <div class="city-name">
                    <h2 id="cityName">加载中...</h2>
                    <span class="province-tag" id="provinceTag">省份</span>
                </div>
            </div>
        </div>

        <div class="knowledge-section">
            <div class="section-header">
                <h3 class="section-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                    </svg>
                    相关知识点
                </h3>
                <button class="create-btn" id="createBtn" onclick="createKnowledge()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"/>
                        <line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    创建知识
                </button>
            </div>

            <div class="knowledge-list" id="knowledgeList">
                <!-- 动态生成 -->
            </div>

            <div class="empty-knowledge" id="emptyKnowledge" style="display: none;">
                <div class="icon">📚</div>
                <h3>暂无知识点</h3>
                <p>还没有关于这个地区的地理知识</p>
                <button class="create-btn" onclick="createKnowledge()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"/>
                        <line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    立即创建
                </button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        // 获取 URL 参数
        function getUrlParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        // 初始化页面
        function initPage() {
            const provinceName = getUrlParam('province');
            const cityName = getUrlParam('city');
            
            if (!provinceName || !cityName) {
                window.location.href = 'map.html';
                return;
            }

            document.getElementById('cityTitle').textContent = cityName;
            document.getElementById('cityName').textContent = cityName;
            document.getElementById('provinceTag').textContent = provinceName;
            document.getElementById('currentCity').textContent = cityName;
            document.getElementById('provinceLink').textContent = provinceName;
            document.getElementById('provinceLink').href = 'province.html?name=' + encodeURIComponent(provinceName);

            // 检查管理员权限
            const currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
            const isAdmin = currentUser && currentUser.role === 'admin';
            document.getElementById('createBtn').style.display = isAdmin ? 'flex' : 'none';

            // 渲染知识列表
            renderKnowledgeList(provinceName, cityName);
        }

        // 渲染知识列表
        function renderKnowledgeList(provinceName, cityName) {
            const list = document.getElementById('knowledgeList');
            const empty = document.getElementById('emptyKnowledge');
            
            const knowledgeData = JSON.parse(localStorage.getItem('geographyKnowledge') || '[]');
            const filteredKnowledge = knowledgeData.filter(k => 
                k.province === provinceName && k.city === cityName
            );

            const currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
            const isAdmin = currentUser && currentUser.role === 'admin';

            if (filteredKnowledge.length === 0) {
                list.style.display = 'none';
                empty.style.display = 'block';
                return;
            }

            list.style.display = 'flex';
            empty.style.display = 'none';

            list.innerHTML = filteredKnowledge.map(item => `
                <div class="knowledge-item" onclick="viewKnowledge(${item.id})">
                    <h4>${escapeHtml(item.title)}</h4>
                    <p>${escapeHtml(item.summary || item.content.substring(0, 100))}</p>
                    <div class="knowledge-meta">
                        <span>📅 ${item.date}</span>
                        <span>📂 ${item.category}</span>
                    </div>
                    ${isAdmin ? `
                    <div class="admin-actions" onclick="event.stopPropagation()">
                        <button class="admin-btn edit" onclick="editKnowledge(${item.id})">编辑</button>
                        <button class="admin-btn delete" onclick="deleteKnowledge(${item.id})">删除</button>
                    </div>
                    ` : ''}
                </div>
            `).join('');
        }

        // 返回上一页
        function goBack() {
            const provinceName = getUrlParam('province');
            if (provinceName) {
                window.location.href = 'province.html?name=' + encodeURIComponent(provinceName);
            } else {
                window.location.href = 'map.html';
            }
        }

        // 创建知识
        function createKnowledge() {
            const provinceName = getUrlParam('province');
            const cityName = getUrlParam('city');
            window.location.href = 'create.html?province=' + encodeURIComponent(provinceName) + '&city=' + encodeURIComponent(cityName);
        }

        // 查看知识
        function viewKnowledge(id) {
            window.location.href = 'knowledge.html?id=' + id;
        }

        // 编辑知识
        function editKnowledge(id) {
            window.location.href = 'edit.html?id=' + id;
        }

        // 删除知识
        function deleteKnowledge(id) {
            if (confirm('确定要删除这条知识吗？')) {
                const knowledgeData = JSON.parse(localStorage.getItem('geographyKnowledge') || '[]');
                const newData = knowledgeData.filter(item => item.id !== id);
                localStorage.setItem('geographyKnowledge', JSON.stringify(newData));
                
                const provinceName = getUrlParam('province');
                const cityName = getUrlParam('city');
                renderKnowledgeList(provinceName, cityName);
            }
        }

        // HTML 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
</html>
