<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识详情 - 地理知识库</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .detail-page {
            min-height: 100vh;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
        }

        .detail-page::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #e8f4fd 0%, #f0f9ff 50%, #e0f2fe 100%);
            z-index: -2;
            transition: opacity 0.5s;
        }

        .detail-page.has-bg::before {
            background: linear-gradient(135deg, rgba(232, 244, 253, var(--overlay-opacity, 0.3)) 0%, 
                        rgba(240, 249, 255, var(--overlay-opacity, 0.3)) 50%, 
                        rgba(224, 242, 254, var(--overlay-opacity, 0.3)) 100%);
        }

        .detail-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-size: cover;
            background-position: center;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .detail-bg.visible {
            opacity: 1;
        }

        /* 视频背景样式 */
        .detail-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .detail-video.visible {
            opacity: 1;
        }

        .detail-video-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(232, 244, 253, var(--overlay-opacity, 0.3)) 0%,
                        rgba(240, 249, 255, var(--overlay-opacity, 0.3)) 50%,
                        rgba(224, 242, 254, var(--overlay-opacity, 0.3)) 100%);
            z-index: 0;
        }

        .detail-bg::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(232, 244, 253, var(--overlay-opacity, 0.3)) 0%, 
                        rgba(240, 249, 255, var(--overlay-opacity, 0.3)) 50%, 
                        rgba(224, 242, 254, var(--overlay-opacity, 0.3)) 100%);
        }

        /* 顶部导航 */
        .detail-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 3rem;
            z-index: 100;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.8);
            color: var(--primary-color);
        }

        .header-actions {
            display: flex;
            gap: 0.75rem;
        }

        .action-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.9);
        }

        .edit-btn {
            color: var(--primary-color);
        }

        .edit-btn:hover {
            background: var(--primary-color);
            color: white;
            transform: scale(1.1);
        }

        .delete-btn {
            color: #ef4444;
        }

        .delete-btn:hover {
            background: #ef4444;
            color: white;
            transform: scale(1.1);
        }

        /* 主内容区域 */
        .detail-main {
            max-width: 900px;
            margin: 0 auto;
            padding: 8rem 3rem 4rem;
            transition: color 0.3s;
        }

        .content-wrapper {
            text-align: var(--content-align, center);
        }

        /* 类别标签 */
        .detail-category {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1.25rem;
            background: rgba(37, 99, 235, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        /* 标题 */
        .detail-title {
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
        }

        /* 日期 */
        .detail-date {
            font-size: 1rem;
            margin-bottom: 3rem;
            opacity: 0.8;
        }

        /* 内容图片 */
        .detail-images {
            margin-bottom: 3rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .detail-image {
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }

        .detail-image img {
            width: 100%;
            display: block;
            transition: transform 0.6s ease;
        }

        .detail-image:hover img {
            transform: scale(1.02);
        }

        /* 简介 */
        .detail-summary {
            font-size: 1.5rem;
            line-height: 1.8;
            padding: 2rem 0;
            border-top: 1px solid rgba(128, 128, 128, 0.2);
            border-bottom: 1px solid rgba(128, 128, 128, 0.2);
            margin-bottom: 3rem;
            text-shadow: 0 1px 10px rgba(0, 0, 0, 0.05);
        }

        /* 内容 */
        .detail-content {
            line-height: 2.2;
            white-space: pre-wrap;
            text-shadow: 0 1px 10px rgba(0, 0, 0, 0.05);
        }

        .detail-content img {
            max-width: 100%;
            border-radius: 16px;
            margin: 2rem 0;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
        }

        .content-image {
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            margin: 2rem 0;
        }

        /* 加载状态 */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(240, 249, 255, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--bg-color);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 未找到 */
        .not-found {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 200;
        }

        .not-found-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
        }

        .not-found h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .not-found p {
            opacity: 0.8;
            margin-bottom: 1.5rem;
        }

        .btn-primary {
            display: inline-block;
            padding: 0.75rem 2rem;
            background: var(--primary-color);
            color: white;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(37, 99, 235, 0.3);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .detail-header {
                padding: 1rem 1.5rem;
            }

            .detail-main {
                padding: 7rem 1.5rem 3rem;
            }

            .detail-title {
                font-size: 2rem !important;
            }

            .detail-summary {
                font-size: 1.2rem;
            }

            .detail-content {
                font-size: 1.05rem !important;
            }
        }
    </style>
</head>
<body class="detail-page" id="detailPage">
    <!-- 背景图片容器 -->
    <div class="detail-bg" id="detailBg"></div>
    <!-- 背景视频容器 -->
    <video id="detailVideo" class="detail-video" autoplay loop muted playsinline></video>
    <div class="detail-video-overlay" id="detailVideoOverlay"></div>

    <!-- 顶部导航 -->
    <header class="detail-header">
        <a href="index.html" class="back-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            返回
        </a>
        <div class="header-actions" id="headerActions"></div>
    </header>

    <!-- 知识内容区域 -->
    <main class="detail-main" id="detailMain">
        <div class="content-wrapper" id="contentWrapper"></div>
    </main>

    <!-- 加载状态 -->
    <div class="loading-overlay" id="loadingState">
        <div class="loading-spinner"></div>
    </div>

    <!-- 未找到 -->
    <div class="not-found" id="notFound">
        <div class="not-found-icon">📭</div>
        <h2>未找到该知识</h2>
        <p>该知识可能已被删除</p>
        <a href="index.html" class="btn-primary">返回首页</a>
    </div>

    <script>
        function getQueryParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function loadKnowledgeDetail() {
            const id = parseInt(getQueryParam('id'));
            const loadingState = document.getElementById('loadingState');
            const notFound = document.getElementById('notFound');

            if (!id) {
                loadingState.style.display = 'none';
                notFound.style.display = 'block';
                return;
            }

            const currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
            if (!currentUser) {
                window.location.href = 'landing.html';
                return;
            }

            // 渲染操作按钮（仅管理员可见）
            const headerActions = document.getElementById('headerActions');
            if (currentUser.role === 'admin') {
                headerActions.innerHTML = `
                    <button class="action-btn edit-btn" onclick="editKnowledge()" title="编辑">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                        </svg>
                    </button>
                    <button class="action-btn delete-btn" onclick="deleteKnowledge()" title="删除">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3 6 5 6 21 6"/>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                        </svg>
                    </button>
                `;
            }

            const knowledgeData = JSON.parse(localStorage.getItem('geographyKnowledge') || '[]');
            const knowledge = knowledgeData.find(item => item.id === id);

            loadingState.style.display = 'none';

            if (!knowledge) {
                notFound.style.display = 'block';
                return;
            }

            document.title = `${knowledge.title} - 地理知识库`;

            // 获取样式设置
            const style = knowledge.style || {};
            const bgType = style.bgType || 'image';
            const bgImage = style.bgImage;
            const bgVideo = style.bgVideo;
            const textAlign = style.textAlign || 'center';
            const textColor = style.textColor || '#1e3a5f';
            const titleSize = style.titleSize || 3;
            const contentSize = style.contentSize || 1.2;
            const overlayOpacity = style.overlayOpacity ?? 0.3;

            // 设置背景（图片或视频）
            const detailPage = document.getElementById('detailPage');
            const detailBg = document.getElementById('detailBg');
            const detailVideo = document.getElementById('detailVideo');
            const detailVideoOverlay = document.getElementById('detailVideoOverlay');

            detailPage.style.setProperty('--overlay-opacity', overlayOpacity);

            if (bgType === 'video' && bgVideo) {
                // 视频背景
                detailVideo.src = bgVideo;
                detailVideo.classList.add('visible');
                detailVideoOverlay.style.opacity = overlayOpacity;
            } else if (bgImage) {
                // 图片背景
                detailBg.style.backgroundImage = `url(${bgImage})`;
                detailBg.classList.add('visible');
                detailPage.classList.add('has-bg');
            }

            // 设置文字样式
            const detailMain = document.getElementById('detailMain');
            const contentWrapper = document.getElementById('contentWrapper');

            detailMain.style.color = textColor;
            contentWrapper.style.setProperty('--content-align', textAlign);

            // 内容直接使用 HTML 格式（支持图片）
            const processedContent = knowledge.content || '';

            // 构建图片HTML
            let imagesHtml = '';
            if (knowledge.images && knowledge.images.length > 0) {
                imagesHtml = `<div class="detail-images">
                    ${knowledge.images.map(img => `
                        <div class="detail-image">
                            <img src="${escapeHtml(img)}" alt="${escapeHtml(knowledge.title)}">
                        </div>
                    `).join('')}
                </div>`;
            }

            contentWrapper.innerHTML = `
                <div class="detail-category">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                        <circle cx="12" cy="10" r="3"/>
                    </svg>
                    ${escapeHtml(knowledge.category)}
                </div>
                <h1 class="detail-title" style="font-size: ${titleSize}rem;">${escapeHtml(knowledge.title)}</h1>
                <div class="detail-date">📅 ${knowledge.date}</div>
                ${imagesHtml}
                ${knowledge.summary ? `<div class="detail-summary">${escapeHtml(knowledge.summary)}</div>` : ''}
                <div class="detail-content" style="font-size: ${contentSize}rem;">
                    ${processedContent}
                </div>
            `;
        }

        function editKnowledge() {
            const id = getQueryParam('id');
            window.location.href = 'edit.html?id=' + id;
        }

        function deleteKnowledge() {
            if (confirm('确定要删除这条知识吗？')) {
                const id = parseInt(getQueryParam('id'));
                let knowledgeData = JSON.parse(localStorage.getItem('geographyKnowledge') || '[]');
                knowledgeData = knowledgeData.filter(item => item.id !== id);
                localStorage.setItem('geographyKnowledge', JSON.stringify(knowledgeData));
                alert('删除成功！');
                window.location.href = 'index.html';
            }
        }

        document.addEventListener('DOMContentLoaded', loadKnowledgeDetail);
    </script>
</body>
</html>
