<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>省份详情 - 地理</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .province-page {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            min-height: 100vh;
        }

        .province-header {
            background: white;
            padding: 1.5rem 2rem;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .back-link {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: var(--primary-color);
        }

        .province-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .province-container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 20px;
        }

        .province-info {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-lg);
        }

        .province-info h2 {
            color: var(--text-primary);
            margin-bottom: 1rem;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .province-info .province-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .cities-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .city-card {
            background: var(--bg-color);
            padding: 1.25rem;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .city-card:hover {
            background: white;
            border-color: var(--primary-color);
            transform: translateY(-3px);
            box-shadow: var(--shadow);
        }

        .city-card h4 {
            color: var(--text-primary);
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        .city-card .knowledge-count {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .city-card .knowledge-count span {
            color: var(--primary-color);
            font-weight: 600;
        }

        .province-stats {
            display: flex;
            gap: 2rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 2px solid var(--bg-color);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .stat-item .icon {
            width: 36px;
            height: 36px;
            background: var(--bg-secondary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat-item .info {
            display: flex;
            flex-direction: column;
        }

        .stat-item .value {
            font-weight: 700;
            color: var(--text-primary);
        }

        .stat-item .label {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .empty-cities {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .empty-cities .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        @media (max-width: 768px) {
            .province-header {
                flex-direction: column;
                gap: 1rem;
            }

            .province-stats {
                flex-direction: column;
                gap: 1rem;
            }

            .cities-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body class="province-page">

        <a href="map.html" class="back-link">

                <path d="M19 12H5M12 19l-7-7 7-7"/>

        // 获取 URL 参数
        function getUrlParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        // 初始化页面
        function initPage() {
            const provinceName = getUrlParam('name');
            
            if (!provinceName) {
                window.location.href = 'map.html';
                return;
            }

            document.getElementById('provinceTitle').textContent = provinceName;
            document.getElementById('provinceName').textContent = provinceName;
            document.getElementById('provinceIcon').textContent = provinceIcons[provinceName] || '📍';

            const data = provinceData[provinceName];
            
            if (data) {
                // 渲染统计信息
                const knowledgeData = JSON.parse(localStorage.getItem('geographyKnowledge') || '[]');
                const provinceKnowledgeCount = knowledgeData.filter(k => k.province === provinceName).length;
                
                document.getElementById('provinceStats').innerHTML = `
                    <div class="stat-item">
                        <div class="icon">🏢</div>
                        <div class="info">
                            <span class="value">${data.cities.length}</span>
                            <span class="label">下辖行政区</span>
                        </div>
                    </div>
                    <div class="stat-item">
                        <div class="icon">📖</div>
                        <div class="info">
                            <span class="value">${provinceKnowledgeCount}</span>
                            <span class="label">相关知识点</span>
                        </div>
                    </div>
                    <div class="stat-item">
                        <div class="icon">📏</div>
                        <div class="info">
                            <span class="value">${data.area}</span>
                            <span class="label">面积 (km²)</span>
                        </div>
                    </div>
                `;

                // 渲染城市网格
                renderCities(provinceName, data.cities);
            } else {
                document.getElementById('citiesGrid').innerHTML = '';
                document.getElementById('emptyCities').style.display = 'block';
            }
        }

        // 渲染城市列表
        function renderCities(provinceName, cities) {
            const grid = document.getElementById('citiesGrid');
            const emptyCities = document.getElementById('emptyCities');
            
            if (cities.length === 0) {
                grid.style.display = 'none';
                emptyCities.style.display = 'block';
                return;
            }

            const knowledgeData = JSON.parse(localStorage.getItem('geographyKnowledge') || '[]');
            
            grid.innerHTML = cities.map(city => {
                const count = knowledgeData.filter(k => k.province === provinceName && k.city === city).length;
                return `
                    <div class="city-card" onclick="goToCity('${provinceName}', '${city}')">
                        <h4>${city}</h4>
                        <div class="knowledge-count">
                            <span>${count}</span> 个知识点
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 跳转到城市页面
        function goToCity(province, city) {
            window.location.href = 'city.html?province=' + encodeURIComponent(province) + '&city=' + encodeURIComponent(city);
        }

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
</html>
